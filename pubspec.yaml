name: nilam_ai
description: "NilamAI - Agricultural AI assistant"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  sqflite: ^2.4.2
  flutter_tts: ^4.2.0
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.2.3
  crypto: ^3.0.7
  path_provider: ^2.1.0
  package_info_plus: ^8.0.0
  http: ^1.2.0
  connectivity_plus: ^6.0.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4+5
  file: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/knowledge/crops.json
    - assets/knowledge/schemes.json
    - assets/knowledge/diseases.json
